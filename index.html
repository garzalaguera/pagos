const { h, render } = preact;
const { useState, useMemo, useEffect } = preactHooks;
const html = htm.bind(h);

const sGet = k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch{return null;} };
const sSet = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch{} };

function openDB() {
  return new Promise((res,rej) => {
    const r=indexedDB.open('mispagos-db',1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    r.onsuccess = e => res(e.target.result);
    r.onerror   = () => rej(r.error);
  });
}
async function idbSet(key,val) {
  const db=await openDB();
  return new Promise((res,rej) => {
    const tx=db.transaction('kv','readwrite');
    tx.objectStore('kv').put(val,key);
    tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
  });
}

async function requestNotifPermission() {
  if(!('Notification' in window)) return 'unsupported';
  if(Notification.permission !== 'default') return Notification.permission;
  return await Notification.requestPermission();
}
async function registerPeriodicSync() {
  if(!('serviceWorker' in navigator)) return;
  try {
    const reg=await navigator.serviceWorker.ready;
    if(!('periodicSync' in reg)) return;
    const tags=await reg.periodicSync.getTags();
    if(!tags.includes('check-payments'))
      await reg.periodicSync.register('check-payments',{minInterval:12*60*60*1000});
  } catch(e) {}
}
async function syncToSW(cards, payments, enabled) {
  try {
    const t=today0(), items=[];
    if(enabled !== false) {
      cards.forEach(card => {
        const add = p => { if(p&&p.cutDate<=t&&!payments[p.key]) items.push({cardName:card.name,limitDate:p.limitDate.toISOString(),key:p.key}); };
        if(card.cycleType==='monthly')     { for(let i=-2;i<=1;i++){const m=monthMeta(i);add(monthlyPeriod(card,m.year,m.month));} }
        else if(card.cycleType==='days')   { const c=daysPeriodAt(card,t); add(daysPrevPeriod(card,c)); add(c); }
        else if(card.cycleType==='months') { for(let i=-4;i<=1;i++){const m=monthMeta(i);add(monthsPeriod(card,m.year,m.month));} }
      });
    }
    await idbSet('upcoming',{items,updated:new Date().toISOString()});
  } catch(e) {}
}

const MESES   = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MESES_C = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const PALETTE = ["#C9A96E","#7EB5A6","#E07B7B","#A78BFA","#60A5FA","#F59E0B","#F472B6","#34D399","#FB923C","#818CF8"];

function blankCard(i) {
  const d=new Date();
  return {
    id:`c${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    name:`Servicio ${i+1}`, color:PALETTE[i%PALETTE.length], cycleType:'monthly',
    cutDay:1, limitDay:20, limitOffset:1,
    intervalDays:30, startDate:d.toISOString().slice(0,10), limitDays:20,
    intervalMonths:2, cutDayM:1,
    startYearMonth:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
    limitDayM:20, limitOffsetM:1,
  };
}
const DEFAULT_CARDS = Array.from({length:3},(_,i)=>({
  ...blankCard(i), id:`c${i+1}`, name:`Tarjeta ${i+1}`,
  cutDay:[10,15,20][i], limitDay:[5,10,15][i], limitOffset:1,
}));

const today0 = () => { const t=new Date(); t.setHours(0,0,0,0); return t; };
const dim    = (y,m) => new Date(y,m,0).getDate();
const clampD = (d,y,m) => Math.min(d,dim(y,m));
const fmtS   = d => `${d.getDate()} ${MESES_C[d.getMonth()]}`;
const fmtF   = d => `${d.getDate()} ${MESES_C[d.getMonth()]} ${d.getFullYear()}`;
const dleft  = lim => Math.ceil((lim-today0())/86400000);
const pctE   = (cut,lim) => { const t=today0(); if(t<cut)return 0; return Math.min(100,Math.max(0,((t-cut)/(lim-cut))*100)); };
function monthMeta(off=0) {
  const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+off);
  return {year:d.getFullYear(), month:d.getMonth()+1};
}

function monthlyPeriod(card,year,month) {
  const cut=new Date(year,month-1,clampD(card.cutDay,year,month));
  let ly=year,lm=month+card.limitOffset; if(lm>12){lm-=12;ly++;}
  return {cutDate:cut, limitDate:new Date(ly,lm-1,clampD(card.limitDay,ly,lm)), key:`${card.id}:M:${year}-${String(month).padStart(2,'0')}`};
}
function daysPeriodAt(card,ref) {
  const start=new Date(card.startDate+'T00:00:00');
  if(ref<start) return null;
  const n=Math.floor((ref-start)/(card.intervalDays*86400000));
  const cut=new Date(start.getTime()+n*card.intervalDays*86400000);
  return {cutDate:cut, limitDate:new Date(cut.getTime()+card.limitDays*86400000), key:`${card.id}:D:${cut.toISOString().slice(0,10)}`, n};
}
function daysPrevPeriod(card,curr) {
  if(!curr||curr.n<=0) return null;
  const cut=new Date(curr.cutDate.getTime()-card.intervalDays*86400000);
  return {cutDate:cut, limitDate:new Date(cut.getTime()+card.limitDays*86400000), key:`${card.id}:D:${cut.toISOString().slice(0,10)}`, n:curr.n-1};
}
function monthsHasCut(card,year,month) {
  const [sy,sm]=card.startYearMonth.split('-').map(Number);
  const diff=(year-sy)*12+(month-sm);
  return diff>=0 && diff%card.intervalMonths===0;
}
function monthsPeriod(card,year,month) {
  if(!monthsHasCut(card,year,month)) return null;
  const cut=new Date(year,month-1,clampD(card.cutDayM,year,month));
  let ly=year,lm=month+card.limitOffsetM; if(lm>12){lm-=12;ly++;}
  return {cutDate:cut, limitDate:new Date(ly,lm-1,clampD(card.limitDayM,ly,lm)), key:`${card.id}:NM:${year}-${String(month).padStart(2,'0')}`};
}
function viewPeriod(card,year,month) {
  if(card.cycleType==='monthly') return monthlyPeriod(card,year,month);
  if(card.cycleType==='months')  return monthsPeriod(card,year,month);
  if(card.cycleType==='days') {
    const t=today0(), curr=daysPeriodAt(card,t), prev=daysPrevPeriod(card,curr);
    const fromStart=daysPeriodAt(card,new Date(year,month-1,1));
    for(const p of [curr,prev,fromStart]) {
      if(!p) continue;
      if((p.cutDate.getFullYear()===year&&p.cutDate.getMonth()+1===month)||(p.limitDate.getFullYear()===year&&p.limitDate.getMonth()+1===month)) return p;
    }
    return null;
  }
  return null;
}
function pStatus(cut,lim) { const t=today0(); return t>lim?'vencido':t>=cut?'activo':'futuro'; }
function pendingOf(card,payments) {
  const t=today0(),out=[];
  if(card.cycleType==='monthly') {
    for(let i=-4;i<=0;i++){const m=monthMeta(i);const p=monthlyPeriod(card,m.year,m.month);if(p.cutDate<=t&&!payments[p.key])out.push(p);}
  } else if(card.cycleType==='days') {
    const curr=daysPeriodAt(card,t),prev=daysPrevPeriod(card,curr);
    for(const p of[prev,curr]) if(p&&p.cutDate<=t&&!payments[p.key])out.push(p);
  } else if(card.cycleType==='months') {
    for(let i=-8;i<=0;i++){const m=monthMeta(i);const p=monthsPeriod(card,m.year,m.month);if(p&&p.cutDate<=t&&!payments[p.key])out.push(p);}
  }
  return out;
}

const BB={fontSize:11,padding:'3px 9px',borderRadius:20,fontWeight:600,whiteSpace:'nowrap'};
const BS={
  paid: {...BB,background:'#0c2215',color:'#4ade80'},
  red:  {...BB,background:'#2b0d0d',color:'#f87171'},
  yel:  {...BB,background:'#1c1500',color:'#fbbf24'},
  grey: {...BB,background:'#141824',color:'#4a5568'},
};
const INP={display:'block',width:'100%',background:'#111827',border:'1px solid #2a3044',borderRadius:8,padding:'8px 10px',color:'#E8E8E8',fontSize:13,marginTop:4,boxSizing:'border-box',outline:'none'};

function Badge({status,paid}) {
  const s=paid?BS.paid:status==='vencido'?BS.red:status==='activo'?BS.yel:BS.grey;
  const t=paid?'✓ Pagado':status==='vencido'?'! Urgente':status==='activo'?'En plazo':'Pendiente';
  return html`<span style=${s}>${t}</span>`;
}

function ProgressBar({cutDate,limitDate,paid,color}) {
  const st=pStatus(cutDate,limitDate),pct=pctE(cutDate,limitDate),dl=dleft(limitDate);
  const barC=paid?'#4ade80':st==='vencido'?'#EF4444':pct>80?'#F59E0B':color;
  const label=paid?'✓ Listo':st==='futuro'?`Corte: ${fmtS(cutDate)}`:st==='vencido'?'⚠ Límite superado':dl<=0?'⚠ Vence hoy':`${dl}d para límite · ${fmtS(limitDate)}`;
  const lc=paid?'#4ade80':st==='vencido'?'#f87171':'#4a5568';
  return html`
    <div style=${{marginTop:7}}>
      <div style=${{background:'#1a1f2e',borderRadius:3,height:3,overflow:'hidden'}}>
        <div style=${{height:'100%',width:`${paid?100:pct}%`,background:barC,borderRadius:3}}/>
      </div>
      <div style=${{fontSize:10,color:lc,marginTop:4}}>${label}</div>
    </div>`;
}

function CheckBtn({checked,color,onToggle}) {
  return html`
    <button onClick=${onToggle} style=${{width:30,height:30,borderRadius:8,flexShrink:0,
      border:`2px solid ${checked?color:'#2a3044'}`,background:checked?color:'transparent',
      cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:15,color:'#0D1117',fontWeight:800}}>${checked?'✓':''}</button>`;
}

function CardRow({card,year,month,payments,onToggle}) {
  const period=viewPeriod(card,year,month);
  const paid=period?!!payments[period.key]:false;
  const st=period?pStatus(period.cutDate,period.limitDate):'none';
  return html`
    <div style=${{background:'#0f1520',border:`1px solid ${paid?'#1a3826':st==='vencido'?'#3b1616':'#1e2535'}`,
      borderRadius:12,padding:'13px 14px',display:'flex',alignItems:'flex-start',gap:12,opacity:!period?0.35:paid?0.72:1}}>
      <div style=${{width:3,minHeight:46,borderRadius:2,background:paid?'#4ade80':card.color,flexShrink:0,marginTop:2}}/>
      <div style=${{flex:1,minWidth:0}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
          <div>
            <div style=${{fontWeight:600,fontSize:14,color:'#E8E8E8',marginBottom:2}}>${card.name}</div>
            <div style=${{fontSize:11,color:'#3a4455'}}>
              ${!period?'Sin corte este mes':`Corte ${fmtS(period.cutDate)} · Límite ${fmtS(period.limitDate)}`}
            </div>
          </div>
          ${period&&html`<${Badge} status=${st} paid=${paid}/>`}
        </div>
        ${period&&html`<${ProgressBar} cutDate=${period.cutDate} limitDate=${period.limitDate} paid=${paid} color=${card.color}/>`}
      </div>
      ${period&&html`<${CheckBtn} checked=${paid} color=${card.color} onToggle=${()=>onToggle(period.key)}/>`}
    </div>`;
}

function SummaryBar({cards,year,month,payments}) {
  const rel=cards.filter(c=>!!viewPeriod(c,year,month));
  const paidN=rel.filter(c=>{const p=viewPeriod(c,year,month);return p&&!!payments[p.key];}).length;
  const pct=rel.length?(paidN/rel.length)*100:0, allOk=rel.length>0&&paidN===rel.length;
  return html`
    <div style=${{background:'#0f1520',border:'1px solid #1e2535',borderRadius:12,padding:'13px 16px',marginBottom:16}}>
      <div style=${{display:'flex',justifyContent:'space-between',marginBottom:8,alignItems:'center'}}>
        <span style=${{fontSize:12,color:'#4a5568'}}>Progreso del mes</span>
        <span style=${{fontSize:13,fontWeight:700,color:allOk?'#4ade80':'#E8E8E8'}}>${paidN}/${rel.length} ${allOk?'✓ Completado':'pagadas'}</span>
      </div>
      <div style=${{background:'#1a1f2e',borderRadius:4,height:5,overflow:'hidden'}}>
        <div style=${{height:'100%',width:`${pct}%`,background:allOk?'#4ade80':'#7EB5A6',borderRadius:4}}/>
      </div>
    </div>`;
}

function PendingView({cards,payments,onToggle}) {
  const items=[];
  cards.forEach(card=>pendingOf(card,payments).forEach(p=>items.push({card,period:p,status:pStatus(p.cutDate,p.limitDate),dl:dleft(p.limitDate)})));
  items.sort((a,b)=>{const av=a.status==='vencido',bv=b.status==='vencido'; if(av&&!bv)return -1; if(!av&&bv)return 1; return a.dl-b.dl;});
  if(!items.length) return html`
    <div style=${{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 20px',gap:12}}>
      <div style=${{fontSize:36}}>✓</div>
      <div style=${{fontSize:17,fontWeight:700,color:'#4ade80'}}>Todo al corriente</div>
      <div style=${{fontSize:13,color:'#3a4455',textAlign:'center'}}>No hay pagos pendientes</div>
    </div>`;
  return html`
    <div style=${{display:'flex',flexDirection:'column',gap:9}}>
      <div style=${{fontSize:11,color:'#3a4455',marginBottom:2}}>${items.length} pago${items.length!==1?'s':''} pendiente${items.length!==1?'s':''}</div>
      ${items.map(({card,period,status})=>html`
        <div key=${period.key} style=${{background:'#0f1520',border:`1px solid ${status==='vencido'?'#3b1616':'#1e2535'}`,borderRadius:12,padding:'13px 14px',display:'flex',alignItems:'center',gap:12}}>
          <div style=${{width:3,alignSelf:'stretch',borderRadius:2,background:card.color,flexShrink:0}}/>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
              <div>
                <div style=${{fontWeight:600,fontSize:14,color:'#E8E8E8',marginBottom:2}}>${card.name}</div>
                <div style=${{fontSize:11,color:'#3a4455'}}>Corte ${fmtF(period.cutDate)} · Límite ${fmtF(period.limitDate)}</div>
              </div>
              <${Badge} status=${status} paid=${false}/>
            </div>
            <${ProgressBar} cutDate=${period.cutDate} limitDate=${period.limitDate} paid=${false} color=${card.color}/>
          </div>
          <${CheckBtn} checked=${false} color=${card.color} onToggle=${()=>onToggle(period.key)}/>
        </div>`)}
    </div>`;
}

function CardEditor({card,onChange,onDelete}) {
  const upd  = (f,v) => onChange({...card,[f]:v});
  const updN = (f,v) => onChange({...card,[f]:parseInt(v)||0});
  return html`
    <div style=${{background:'#111827',borderRadius:12,padding:14,marginBottom:10}}>
      <div style=${{display:'flex',gap:10,alignItems:'center',marginBottom:10}}>
        <input type="color" value=${card.color} onInput=${e=>upd('color',e.target.value)}
          style=${{width:30,height:30,borderRadius:6,border:'1px solid #2a3044',cursor:'pointer',padding:2,background:'#1a1f2e',flexShrink:0}}/>
        <input value=${card.name} onInput=${e=>upd('name',e.target.value)} placeholder="Nombre del servicio"
          style=${{...INP,marginTop:0,flex:1}}/>
        <button onClick=${onDelete} style=${{background:'#2b0d0d',border:'1px solid #5a1f1f',color:'#f87171',
          width:30,height:30,borderRadius:8,cursor:'pointer',fontSize:14,flexShrink:0,
          display:'flex',alignItems:'center',justifyContent:'center'}}>🗑</button>
      </div>
      <label style=${{fontSize:11,color:'#4a5568'}}>Tipo de ciclo
        <select value=${card.cycleType} onChange=${e=>upd('cycleType',e.target.value)} style=${{...INP,fontSize:12}}>
          <option value="monthly">Mensual — fecha fija</option>
          <option value="days">Cada N días naturales</option>
          <option value="months">Cada N meses</option>
        </select>
      </label>
      ${card.cycleType==='monthly'&&html`
        <div style=${{display:'flex',gap:8,marginTop:8}}>
          <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Día de corte
            <input type="number" min="1" max="31" value=${card.cutDay} onInput=${e=>updN('cutDay',e.target.value)} style=${INP}/>
          </label>
          <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Día límite
            <input type="number" min="1" max="31" value=${card.limitDay} onInput=${e=>updN('limitDay',e.target.value)} style=${INP}/>
          </label>
          <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Mes límite
            <select value=${card.limitOffset} onChange=${e=>updN('limitOffset',e.target.value)} style=${{...INP,fontSize:12}}>
              <option value="0">Mismo</option><option value="1">Siguiente</option>
            </select>
          </label>
        </div>`}
      ${card.cycleType==='days'&&html`
        <div>
          <div style=${{display:'flex',gap:8,marginTop:8}}>
            <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Cada cuántos días
              <input type="number" min="1" max="365" value=${card.intervalDays} onInput=${e=>updN('intervalDays',e.target.value)} style=${INP}/>
            </label>
            <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Días para pagar
              <input type="number" min="1" max="60" value=${card.limitDays} onInput=${e=>updN('limitDays',e.target.value)} style=${INP}/>
            </label>
          </div>
          <label style=${{fontSize:11,color:'#4a5568',marginTop:8,display:'block'}}>Fecha del primer corte
            <input type="date" value=${card.startDate} onInput=${e=>upd('startDate',e.target.value)} style=${INP}/>
          </label>
        </div>`}
      ${card.cycleType==='months'&&html`
        <div>
          <div style=${{display:'flex',gap:8,marginTop:8}}>
            <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Cada cuántos meses
              <input type="number" min="1" max="12" value=${card.intervalMonths} onInput=${e=>updN('intervalMonths',e.target.value)} style=${INP}/>
            </label>
            <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Día de corte
              <input type="number" min="1" max="31" value=${card.cutDayM} onInput=${e=>updN('cutDayM',e.target.value)} style=${INP}/>
            </label>
          </div>
          <div style=${{display:'flex',gap:8,marginTop:8}}>
            <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Día límite
              <input type="number" min="1" max="31" value=${card.limitDayM} onInput=${e=>updN('limitDayM',e.target.value)} style=${INP}/>
            </label>
            <label style=${{flex:1,fontSize:11,color:'#4a5568'}}>Mes límite
              <select value=${card.limitOffsetM} onChange=${e=>updN('limitOffsetM',e.target.value)} style=${{...INP,fontSize:12}}>
                <option value="0">Mismo</option><option value="1">Siguiente</option>
              </select>
            </label>
          </div>
          <label style=${{fontSize:11,color:'#4a5568',marginTop:8,display:'block'}}>Mes del primer corte
            <input type="month" value=${card.startYearMonth} onInput=${e=>upd('startYearMonth',e.target.value)} style=${INP}/>
          </label>
        </div>`}
    </div>`;
}

function NotifSection({notifState, notifEnabled, onToggle}) {
  const granted = notifState==='granted';
  const denied  = notifState==='denied';
  const active  = granted && notifEnabled;
  const label   = denied ? 'Bloqueadas en ajustes del sistema'
                : !granted ? 'No configuradas'
                : active ? 'Activas — 3 días antes del vencimiento'
                : 'Desactivadas';
  const dotColor = active ? '#4ade80' : '#4a5568';
  return html`
    <div style=${{borderTop:'1px solid #1e2535',paddingTop:16,marginTop:4}}>
      <div style=${{fontSize:10,letterSpacing:2,color:'#2a3044',textTransform:'uppercase',marginBottom:12}}>Recordatorios</div>
      <div style=${{background:'#111827',border:'1px solid #1e2535',borderRadius:12,padding:'12px 14px',display:'flex',alignItems:'center',gap:12}}>
        <div style=${{fontSize:18}}>🔔</div>
        <div style=${{flex:1}}>
          <div style=${{fontSize:13,fontWeight:600,color:'#E8E8E8',marginBottom:3}}>Notificaciones</div>
          <div style=${{fontSize:11,color:dotColor}}>${active?'●':'○'} ${label}</div>
        </div>
        ${denied
          ? html`<span style=${{fontSize:10,color:'#f87171',textAlign:'right',lineHeight:'15px',maxWidth:72}}>Activar en ajustes del sistema</span>`
          : html`<button onClick=${onToggle}
              style=${{background:active?'transparent':'#7EB5A6',
                border:`1px solid ${active?'#3a4455':'#7EB5A6'}`,
                borderRadius:8,color:active?'#4a5568':'#0D1117',
                fontSize:12,fontWeight:700,cursor:'pointer',padding:'6px 12px',whiteSpace:'nowrap'}}>
              ${active?'Desactivar':'Activar'}
            </button>`}
      </div>
    </div>`;
}

function SettingsPanel({cards,onSave,onClose,notifState,notifEnabled,onNotifToggle}) {
  const [local,setLocal]=useState(()=>JSON.parse(JSON.stringify(cards)));
  return html`
    <div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:200}}
      onClick=${e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style=${{background:'#0D1117',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:520,maxHeight:'92vh',overflowY:'auto',padding:'22px 16px 48px'}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style=${{fontWeight:700,fontSize:16,color:'#E8E8E8'}}>Configurar servicios</div>
          <button onClick=${onClose} style=${{background:'none',border:'none',color:'#555',fontSize:22,cursor:'pointer'}}>✕</button>
        </div>
        ${local.map(card=>html`
          <${CardEditor} key=${card.id} card=${card}
            onChange=${nc=>setLocal(p=>p.map(c=>c.id===card.id?nc:c))}
            onDelete=${()=>setLocal(p=>p.filter(c=>c.id!==card.id))}/>`)}
        <button onClick=${()=>setLocal(p=>[...p,blankCard(p.length)])}
          style=${{width:'100%',padding:'12px',background:'transparent',border:'1px dashed #2a3044',borderRadius:10,color:'#4a5568',fontSize:13,cursor:'pointer',marginBottom:14}}>
          + Agregar servicio
        </button>
        <button onClick=${()=>{onSave(local);onClose();}}
          style=${{width:'100%',padding:'14px',background:'#7EB5A6',border:'none',borderRadius:10,color:'#0D1117',fontWeight:700,fontSize:15,cursor:'pointer',marginBottom:20}}>
          Guardar cambios
        </button>
        <${NotifSection} notifState=${notifState} notifEnabled=${notifEnabled} onToggle=${onNotifToggle}/>
      </div>
    </div>`;
}

function App() {
  const [cards,        setCards]        = useState(()=>sGet('mp_cards')    || DEFAULT_CARDS);
  const [payments,     setPayments]     = useState(()=>sGet('mp_payments') || {});
  const [tab,          setTab]          = useState(0);
  const [showCfg,      setShowCfg]      = useState(false);
  const [notifState,   setNotifState]   = useState(()=>typeof Notification!=='undefined'?Notification.permission:'unsupported');
  const [notifEnabled, setNotifEnabled] = useState(()=>sGet('mp_notif')!==false);
  const [showBanner,   setShowBanner]   = useState(false);

  useEffect(()=>{
    if(notifState==='default') setShowBanner(true);
    if(notifState==='granted') registerPeriodicSync();
    syncToSW(cards, payments, notifEnabled);
  },[]);

  const persist = (nc,np,ne) => {
    sSet('mp_cards',nc); sSet('mp_payments',np);
    syncToSW(nc, np, ne!==undefined ? ne : notifEnabled);
  };
  const saveCards = nc  => { setCards(nc); persist(nc,payments); };
  const togglePay = key => { const np={...payments,[key]:!payments[key]}; setPayments(np); persist(cards,np); };

  const handleNotifToggle = async () => {
    if(notifState==='granted') {
      const next=!notifEnabled;
      setNotifEnabled(next); sSet('mp_notif',next);
      syncToSW(cards,payments,next);
    } else {
      const result=await requestNotifPermission();
      setNotifState(result); setShowBanner(false);
      if(result==='granted') {
        setNotifEnabled(true); sSet('mp_notif',true);
        registerPeriodicSync(); syncToSW(cards,payments,true);
      }
    }
  };

  const {year,month}=monthMeta(tab==='p'?0:tab);
  const pendingCount=useMemo(()=>{let n=0;cards.forEach(c=>{n+=pendingOf(c,payments).length;});return n;},[cards,payments]);
  const tabs=[
    {id:-1,label:MESES[monthMeta(-1).month-1]},
    {id:0, label:MESES[monthMeta(0).month-1]},
    {id:'p',label:'Pendientes'},
  ];

  return html`
    <div style=${{minHeight:'100vh',background:'#0D1117',color:'#E8E8E8',padding:'env(safe-area-inset-top,28px) 16px 64px',maxWidth:480,margin:'0 auto'}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,paddingTop:14}}>
        <div>
          <div style=${{fontSize:10,letterSpacing:3.5,color:'#1e2535',textTransform:'uppercase',marginBottom:4}}>Control de pagos</div>
          <div style=${{fontSize:24,fontWeight:800,letterSpacing:-0.8}}>Mis Pagos</div>
        </div>
        <button onClick=${()=>setShowCfg(true)}
          style=${{background:'#111827',border:'1px solid #2a3044',color:'#555',padding:'8px 12px',borderRadius:9,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:5,marginTop:4}}>
          ⚙ Configurar
        </button>
      </div>

      ${showBanner&&notifState==='default'&&html`
        <div style=${{background:'#111827',border:'1px solid #2a3044',borderRadius:12,padding:'12px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
          <div style=${{fontSize:20}}>🔔</div>
          <div style=${{flex:1}}>
            <div style=${{fontSize:13,fontWeight:600,color:'#E8E8E8',marginBottom:2}}>Activar recordatorios</div>
            <div style=${{fontSize:11,color:'#4a5568'}}>Alertas 3 días antes de cada vencimiento</div>
          </div>
          <div style=${{display:'flex',gap:6}}>
            <button onClick=${()=>setShowBanner(false)} style=${{background:'none',border:'none',color:'#555',fontSize:18,cursor:'pointer',padding:'4px'}}>✕</button>
            <button onClick=${handleNotifToggle} style=${{background:'#7EB5A6',border:'none',borderRadius:8,color:'#0D1117',fontSize:12,fontWeight:700,cursor:'pointer',padding:'6px 12px'}}>Activar</button>
          </div>
        </div>`}

      <div style=${{display:'flex',marginBottom:16,background:'#0f1520',borderRadius:11,padding:4,border:'1px solid #1e2535',gap:3}}>
        ${tabs.map(t=>{
          const active=tab===t.id;
          return html`
            <button key=${String(t.id)} onClick=${()=>setTab(t.id)}
              style=${{flex:1,padding:'8px 0',borderRadius:8,border:'none',cursor:'pointer',
                background:active?'#1e2a3a':'transparent',color:active?'#E8E8E8':'#3a4455',
                fontSize:12,fontWeight:active?700:400,position:'relative'}}>
              ${t.label}
              ${t.id==='p'&&pendingCount>0&&html`
                <span style=${{position:'absolute',top:4,right:6,background:'#EF4444',color:'#fff',
                  borderRadius:99,fontSize:9,fontWeight:700,padding:'1px 5px',lineHeight:'14px'}}>
                  ${pendingCount}
                </span>`}
            </button>`;
        })}
      </div>

      ${tab!=='p'?html`
        <${SummaryBar} cards=${cards} year=${year} month=${month} payments=${payments}/>
        <div style=${{display:'flex',flexDirection:'column',gap:9}}>
          ${cards.map(card=>html`
            <${CardRow} key=${card.id} card=${card} year=${year} month=${month} payments=${payments} onToggle=${togglePay}/>`)}
        </div>`
      :html`<${PendingView} cards=${cards} payments=${payments} onToggle=${togglePay}/>`}

      <div style=${{marginTop:22,textAlign:'center',fontSize:10,color:'#1e2535'}}>
        Toca ✓ para marcar como pagado · Datos guardados localmente
      </div>

      ${showCfg&&html`
        <${SettingsPanel} cards=${cards} onSave=${saveCards} onClose=${()=>setShowCfg(false)}
          notifState=${notifState} notifEnabled=${notifEnabled} onNotifToggle=${handleNotifToggle}/>`}
    </div>`;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>

<script>
  if('serviceWorker' in navigator)
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
</body>
</html>
